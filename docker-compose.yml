services:

  hi-sportdb-mongo:
    image: registry.diginfra.net/tsd/hi-sportdb-mongo:0.0.1
    ports:
      - '27017:27017'
    expose:
      - '27017'
    volumes:
      - hi-sportdb-mongo-data:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' > /dev/null" ]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks:
      - hi-sportdb-net

  hi-sportdb-elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - '9200:9200'
      - '9300:9300'
    expose:
      - '9200'
      - '9300'
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null" ]
      interval: 5s
      timeout: 5s
      retries: 60
    volumes:
      - hi-sportdb-es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - hi-sportdb-net

  hi-sportdb-panoptes:
    image: registry.diginfra.net/tsd/panoptes-backend:hi-sportdb
    environment:
      - ES_SCHEME=http
      - ES_HOST=hi-sportdb-elastic
      - ES_PORT=9200
      - MONGO_CONNECTION=mongodb://hi-sportdb-mongo:27017/
    depends_on:
      hi-sportdb-mongo:
        condition: service_healthy
      hi-sportdb-elastic:
        condition: service_healthy
    ports:
      - '8000:8000'
    expose:
      - '8000'
    restart: unless-stopped
    networks:
      - hi-sportdb-net

  hi-sportdb-panoptes-browser:
    image: registry.diginfra.net/tsd/hi-sportdb-browser:0.0.1
    environment:
      - VITE_PANOPTES_URL=http://localhost:8000
      - VITE_PANOPTES_IS_EMBEDDED=false
      - VITE_PANOPTES_DATASET=sport
      - VITE_PANOPTES_SEARCH_PATH=/$$dataset/search
      - VITE_PANOPTES_DETAIL_PATH=/$$dataset/details/$$id
    ports:
      - "80:80"
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - hi-sportdb-net

  hi-sportdb-indexer:
    image: registry.diginfra.net/tsd/hi-sportdb-indexer:0.0.1
    environment:
      - ES_HOST=hi-sportdb-elastic
      - ES_PORT=9200
    depends_on:
      hi-sportdb-elastic:
        condition: service_healthy
    restart: no
    networks:
      - hi-sportdb-net
    profiles:
      - indexer

volumes:
  hi-sportdb-es-data:
  hi-sportdb-mongo-data:

networks:
  hi-sportdb-net: